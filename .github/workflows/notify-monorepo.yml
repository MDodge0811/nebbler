name: Notify monorepo on merge to main

on:
  push:
    branches: [main]

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger monorepo submodule update
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.MONOREPO_PAT }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: 'MDodge0811',
              repo: 'nebbler-monorepo',
              event_type: 'submodule-updated',
              client_payload: { submodule: 'nebbler' }
            });
